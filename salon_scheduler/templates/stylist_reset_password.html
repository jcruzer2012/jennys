{% extends "base.html" %}

{% block content %}
<section class="card form-shell">
    <div class="section-heading standalone">
        <div>
            <p class="eyebrow">Stylist Access</p>
            <h2>Reset password</h2>
            <p>Use your username and reset code to choose a new password.</p>
        </div>
    </div>
    <form method="post" class="form-grid request-form-grid">
        <label>
            Username
            <input type="text" name="username" required>
        </label>
        <label>
            Reset code
            <input type="password" name="reset_code" required>
        </label>
        <label>
            New password
            <input type="password" name="password" required>
        </label>
        <label>
            Confirm new password
            <input type="password" name="confirm_password" required>
        </label>
        <div class="actions-row">
            <button class="button" type="submit">Reset password</button>
        </div>
    </form>
    <p class="stylist-link"><a href="{{ url_for('main.stylist_login') }}">Back to stylist sign in</a></p>
</section>
{% endblock %}
