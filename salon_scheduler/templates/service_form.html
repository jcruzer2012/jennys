{% extends "base.html" %}

{% block content %}
<section class="form-shell card">
    <div class="section-heading standalone">
        <div>
            <p class="eyebrow">Services</p>
            <h2>{{ "Edit service" if service else "Add a service" }}</h2>
        </div>
    </div>

    <form method="post" class="form-grid">
        <label class="full">
            Display name
            <input type="text" name="display_name" value="{{ service.display_name if service else '' }}" required>
        </label>
        <label class="full">
            Client-facing description
            <textarea name="description" rows="4">{{ service.description if service else '' }}</textarea>
        </label>
        <label class="full">
            Internal description
            <textarea name="internal_description" rows="4">{{ service.internal_description if service else '' }}</textarea>
        </label>
        <label>
            Price
            <input type="number" min="0" step="0.01" name="price" value="{{ '%.2f'|format(service.price) if service else '0.00' }}" required>
        </label>
        <label>
            Cost
            <input type="number" min="0" step="0.01" name="cost" value="{{ '%.2f'|format(service.cost) if service else '0.00' }}" required>
        </label>
        <label>
            Buffer time
            <input type="number" min="0" step="5" name="buffer_minutes" value="{{ service.buffer_minutes if service else 0 }}" required>
            <small>Extra minutes automatically blocked after this service.</small>
        </label>
        <div class="full actions-row">
            <button class="button" type="submit">Save service</button>
            <a class="button subtle" href="{{ url_for('main.services') }}">Back to services</a>
        </div>
    </form>
</section>
{% endblock %}
